<!doctype html>
<html>
  <head>
    <meta charset="UTF-8" />
    <title>Pending</title>
    <script>
      // GitHub Pages SPA redirect fix.
      // Encoded path stored as query param so index.html can restore it.
      var segmentCount = 1; // number of path segments in the repo name (1 for /pending/)
      var l = window.location;
      l.replace(
        l.protocol + '//' + l.hostname + (l.port ? ':' + l.port : '') +
        l.pathname.split('/').slice(0, 1 + segmentCount).join('/') + '/?/' +
        l.pathname.slice(1).split('/').slice(segmentCount).join('/').replace(/&/g, '~and~') +
        (l.search ? '&' + l.search.slice(1).replace(/&/g, '~and~') : '') +
        l.hash
      );
    </script>
  </head>
  <body></body>
</html>
